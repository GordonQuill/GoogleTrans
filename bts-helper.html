<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Помощник</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --glow: rgba(124, 106, 255, 0.3);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
    animation: drift 8s ease-in-out infinite alternate;
  }
  .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; }
  .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation-delay: -4s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(30px, 20px) scale(1.05); }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px);
    pointer-events: none;
    z-index: 10;
  }

  .card {
    position: relative;
    z-index: 5;
    width: min(560px, 92vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px 44px;
    box-shadow: 0 0 0 1px rgba(124,106,255,0.1), 0 40px 80px rgba(0,0,0,0.6), 0 0 60px var(--glow);
  }

  .dots { display: flex; gap: 7px; margin-bottom: 36px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }

  .headline {
    font-size: clamp(1.4rem, 4vw, 1.75rem);
    font-weight: 800;
    line-height: 1.25;
    margin-bottom: 10px;
    letter-spacing: -0.03em;
  }
  .headline span {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 36px;
    letter-spacing: 0.03em;
  }

  .search-bar {
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    min-height: 52px;
    position: relative;
    overflow: hidden;
  }
  .search-bar::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    opacity: 0;
    background: linear-gradient(90deg, rgba(124,106,255,0.08), rgba(255,106,155,0.08));
    transition: opacity 0.5s;
  }
  .search-bar.active::before { opacity: 1; }

  .search-icon { color: var(--muted); font-size: 1rem; flex-shrink: 0; transition: color 0.3s; }
  .search-bar.active .search-icon { color: var(--accent); }

  .typed-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent);
    vertical-align: text-bottom;
    animation: blink 0.75s step-end infinite;
    margin-left: 1px;
    border-radius: 1px;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.01em;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s;
    box-shadow: 0 8px 30px rgba(124, 106, 255, 0.35);
    text-decoration: none;
    display: block;
    text-align: center;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
    pointer-events: none;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(124, 106, 255, 0.5); }
  .btn:active { transform: translateY(0); }

  .status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    margin-top: 20px;
    height: 16px;
    transition: color 0.3s;
  }
  .status.ready { color: #28c840; }

  .progress-track { height: 2px; background: var(--border); border-radius: 2px; margin-bottom: 28px; overflow: hidden; }
  .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.1s linear; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">
  <div class="dots">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
  </div>

  <div class="headline">Позволь,<br>я сделаю это <span>за тебя</span></div>
  <div class="sub">// автоматический поиск · google.com</div>

  <div class="progress-track">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div class="search-bar" id="searchBar">
    <span class="search-icon">🔍</span>
    <div class="typed-text" id="typedText"><span class="cursor"></span></div>
  </div>

  <!-- Используем <a> вместо window.open — работает на всех мобильных -->
  <a class="btn" id="btn" href="https://www.google.com/search?q=%D0%BA%D1%83%D0%BF%D0%B8%D1%82%D1%8C+%D0%B1%D0%B8%D0%BB%D0%B5%D1%82%D1%8B+%D0%BD%D0%B0+%D0%91%D0%A2%D0%A1" onclick="startAnim()">
    Найти билеты на BTS
  </a>

  <div class="status" id="status">// нажми кнопку</div>
</div>

<script>
  const QUERY = 'купить билеты на БТС';
  const typedEl = document.getElementById('typedText');
  const searchBar = document.getElementById('searchBar');
  const statusEl = document.getElementById('status');
  const progressEl = document.getElementById('progress');

  function setStatus(text, cls = '') {
    statusEl.textContent = text;
    statusEl.className = 'status ' + cls;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function typeText(text, speed = 70) {
    typedEl.innerHTML = '<span class="cursor"></span>';
    for (let i = 0; i < text.length; i++) {
      await sleep(speed + Math.random() * 35);
      typedEl.innerHTML = text.slice(0, i + 1) + '<span class="cursor"></span>';
    }
  }

  async function startAnim() {
    // Переход уже происходит через href — просто запускаем анимацию параллельно
    searchBar.classList.add('active');
    setStatus('// ввод запроса...');

    let prog = 0;
    const ticker = setInterval(() => {
      prog = Math.min(prog + 3, 95);
      progressEl.style.width = prog + '%';
    }, 60);

    await typeText(QUERY, 65);
    clearInterval(ticker);
    progressEl.style.width = '100%';
    setStatus('// готово! открываю Google ✓', 'ready');
  }
</script>
</body>
</html>
